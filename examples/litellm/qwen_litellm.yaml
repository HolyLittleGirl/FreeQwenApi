# LiteLLM bridge for Claude Code -> FreeQwenApi -> Qwen Chat
# Start FreeQwenApi first: SKIP_ACCOUNT_MENU=true npm start
# Then run: litellm --config examples/litellm/qwen_litellm.yaml --host 127.0.0.1 --port 4000

model_list:
  - model_name: qwen3.7-max
    litellm_params:
      model: openai/qwen3.7-max
      api_base: http://localhost:3264/api
      api_key: dummy-key

  - model_name: qwen3.7-plus
    litellm_params:
      model: openai/qwen3.7-plus
      api_base: http://localhost:3264/api
      api_key: dummy-key

  - model_name: qwen3-coder-plus
    litellm_params:
      model: openai/qwen3-coder-plus
      api_base: http://localhost:3264/api
      api_key: dummy-key

general_settings:
  master_key: sk-qwen-local
